<!DOCTYPE html>
<html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Examen</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

       <style>
         body{
                background-color:#f2f2f2;
            }

            .calculadora{
                max-width:600px;
                margin:50px auto;
                background:rgb(238, 231, 238);
                border-radius:8px;
                box-shadow:0 0 10px rgb(234, 4, 255);
                overflow:hidden;
            }

            .titulo{
                background:#750dfd;
                color:rgb(248, 243, 248);
                text-align:center;
                padding:15px;
                font-size:35px;
                font-weight:bold;
            }

            .contenido{
                padding:20px;
            }

            .btn{
                width:100%;
                margin-bottom:10px;
            }

        
    </style>   
</head>
<body>

<div class="container">
        <div class="calculadora">

            <div class="titulo">
                CALCULADORA BÁSICA
            </div>

            <div class="contenido">

                <div class="mb-3">
                    <label class="form-label"> Ingrese el Primer Número</label>
                    <input type="number" id="num1" class="form-control" value="5">
                </div>

                <div class="mb-3">
                    <label class="form-label"> Ingrese el Segundo Número</label>
                    <input type="number" id="num2" class="form-control" value="3">
                </div>

                <button class="btn btn-success" onclick="sumar()">
                    Sumar
                </button>

                <button class="btn btn-warning" onclick="restar()">
                    Restar
                </button>

                <button class="btn btn-info text-white" onclick="multiplicar()">
                    Multiplicar
                </button>

                <button class="btn btn-danger" onclick="dividir()">
                    Dividir
                </button>

                <div class="mt-4">
                    <label class="form-label">Resultado</label>
                    <input type="text" id="resultado" class="form-control" readonly>
                </div>

            </div>
        </div>
    </div>

        <script>
            function obtenerValores(){
                let n1 = parseFloat(document.getElementById("num1").value);
                let n2 = parseFloat(document.getElementById("num2").value);

                return {n1,n2};
                }

            function sumar(){
                let {n1,n2} = obtenerValores();
                document.getElementById("resultado").value = n1 + n2;
                }

            function restar(){
                let {n1,n2} = obtenerValores();
                document.getElementById("resultado").value = n1 - n2;
                }

            function multiplicar(){
                let {n1,n2} = obtenerValores();
                document.getElementById("resultado").value = n1 * n2;
                }

            function dividir(){
                let {n1,n2} = obtenerValores();
                if(n2 == 0){
                document.getElementById("resultado").value =
                "No es posible dividir por cero";
            }else{
                document.getElementById("resultado").value = n1 / n2;
            }
        }

    </script>
    </body>

</html>
